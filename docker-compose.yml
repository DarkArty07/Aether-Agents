# ==============================================================================
# Aether Agents — Docker Compose
# ==============================================================================
# Spins up Honcho (memory provider) alongside any future Aether services.
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose down               # stop and remove
#   docker compose logs -f            # follow logs
#   docker compose ps                 # check status
#
# The Honcho server is self-contained under honcho-server/.
# Its .env file (honcho-server/.env) is generated from .env.template
# by scripts/setup-honcho.sh.
# ==============================================================================

services:
  api:
    build:
      context: ./honcho-server
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8010:8000"
    env_file:
      - path: ./honcho-server/.env
        required: true
    restart: unless-stopped

  deriver:
    build:
      context: ./honcho-server
      dockerfile: Dockerfile
    entrypoint: ["sh", "-c", "cd /app && PYTHONPATH=/app/src /app/.venv/bin/python -m deriver"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: ./honcho-server/.env
        required: true
    restart: unless-stopped

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=honcho
      - POSTGRES_USER=honcho
      - POSTGRES_PASSWORD=honcho
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./honcho-server/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - honcho_pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honcho -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - honcho_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  honcho_pgdata:
  honcho_redis_data:
