# Aether Agents — Hermes Orchestrator Config
# This is the main config for the Aether project's HERMES_HOME.
# Each Daimon profile has its own config in profiles/<name>/config.yaml
#
# NOTE: Run scripts/configure.sh after cloning to substitute __AETHER_ROOT__
# and __HERMES_PYTHON__ with the actual paths for this machine.

model:
  default: glm-5.1
  provider: zai
  base_url: https://api.z.ai/api/coding/paas/v4
  api_mode: chat_completions

providers: {}
fallback_providers: []

toolsets:
  - hermes-cli

agent:
  max_turns: 150
  gateway_timeout: 1800
  restart_drain_timeout: 60
  tool_use_enforcement: auto

terminal:
  backend: local
  timeout: 180
  persistent_shell: true

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

# Load all skills from project directory (self-contained, no external deps)
skills:
  external_dirs:
    - __AETHER_ROOT__/skills

# Olympus MCP server — connects Hermes to Daimons
mcp_servers:
  olympus:
    command: __HERMES_PYTHON__
    args:
      - -m
      - olympus.server
    env:
      AETHER_HOME: __AETHER_ROOT__/home
      PYTHONPATH: __AETHER_ROOT__/src
    enabled: true

# Logging
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3

# Security
security:
  redact_secrets: true
