# Athena configuration — Aether Agents Daimon (Level 2)

# Agent discovery field — Olympus reads this to register the Daimon
agent:
  name: athena
  role: security-engineer
  description: "Security Engineer del ecosistema. Protección proactiva, threat modeling, security review."
  capabilities:
    - talk_to
    - threat-modeling
    - security-review
    - dependency-audit
    - risk-communication
  launch_command: "hermes acp"
  keep_alive: true

# Model configuration
model: kimi-k2.6
provider: opencode-go
base_url: https://opencode.ai/zen/go/v1

# Toolsets — security analysis tools
toolsets:
  - terminal
  - file
  - search_files
  - execute_code
  - memory
  - skills

skills: {}

# Session settings
# Personality overlay must be "none" — prevents kawaii default from overwriting SOUL.md
display:
  personality: none

max_iterations: 50