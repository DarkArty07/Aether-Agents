# Ictinus configuration — Aether Agents Daimon (Level 1 Consultant)

# Agent discovery field — Olympus reads this to register the Daimon
agent:
  name: ictinus
  role: backend-architect
  description: "Backend Architect specializing in scalable system design, database architecture, API development, and cloud infrastructure. Designs robust, secure, performant server-side systems. Does not implement production frontend."
  capabilities:
    - receives_from
    - system-architecture
    - database-design
    - api-design
    - cloud-infrastructure
    - security-review
    - performance-optimization
  launch_command: "hermes acp"
  keep_alive: true
  level: 1

# Model configuration
model:
  default: glm-5.1
  provider: opencode-go
  base_url: https://opencode.ai/zen/go/v1

# Toolsets — architecture and specification tools
toolsets:
  - terminal
  - file
  - search_files
  - patch
  - execute_code
  - skills

skills:
  external_dirs:
    - /home/prometeo/Aether-Agents/home/skills

# Session settings
# Personality overlay must be "none" — prevents kawaii default from overwriting SOUL.md
display:
  personality: none

max_iterations: 50

# Auto-approve commands — Daimons have no interactive user for approval prompts
approvals:
  mode: 'off'
# Olympus v3 observability plugin
plugins:
  enabled:
    - olympus_v3
    - aether
