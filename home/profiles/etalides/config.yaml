# Etalides configuration — Aether Agents Daimon (Level 2)

# Agent discovery field — Olympus reads this to register the Daimon
agent:
  name: etalides
  role: web-researcher
  description: "Web Researcher puro. Busca, extrae, y entrega información verificable. Nunca opina."
  capabilities:
    - receives_from
    - web-search
    - web-extract
    - link-budget
    - structured-output
  launch_command: "hermes acp"
  keep_alive: true

# Model configuration
model:
  default: deepseek-v4-flash
  provider: opencode-go
  base_url: https://opencode.ai/zen/go/v1

# Web search backend — Exa for high-quality research
web:
  backend: "exa"

# Toolsets — web research tools
toolsets:
  - web
  - browser
  - file

# Link budget for research tasks
link_budget:
  max_links: 10
  fast_mode: 5

skills:
  external_dirs:
    - /home/prometeo/Aether-Agents/home/skills

# Session settings
# Personality overlay must be "none" — prevents kawaii default from overwriting SOUL.md
display:
  personality: none

max_iterations: 80