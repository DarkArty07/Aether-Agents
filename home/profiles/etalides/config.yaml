# Etalides configuration — Aether Agents Daimon (Level 2)

# Agent discovery field — Olympus reads this to register the Daimon
agent:
  name: etalides
  role: web-researcher
  description: "Web Researcher puro. Busca, extrae, y entrega información verificable. Nunca opina."
  capabilities:
    - receives_from
    - web-search
    - web-extract
    - link-budget
    - structured-output
  launch_command: "hermes acp"
  keep_alive: true

# Model configuration
# Using qwen3.6-plus (fast, reliable, in opencode-go catalog) — previous minimax-m2.7
# timed out on research, deepseek-v4-flash was misrouted by hermes-agent model_normalize
model: qwen3.6-plus
provider: opencode-go
base_url: https://opencode.ai/zen/go/v1

# Toolsets — web research tools only
toolsets:
  - web
  - browser
  - file

skills:
  external_dirs:
    - /home/prometeo/Aether-Agents/home/skills

# Session settings
# Personality overlay must be "none" — prevents kawaii default from overwriting SOUL.md
display:
  personality: none

max_iterations: 50

# Etalides-specific: link budget
link_budget:
  max_links: 10
  fast_mode: 5