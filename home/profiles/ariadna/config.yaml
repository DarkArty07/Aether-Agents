# Ariadna configuration — Aether Agents Daimon (Level 2)

# Agent discovery field — Olympus reads this to register the Daimon
agent:
  name: ariadna
  role: project-manager
  description: "Project Manager y Agile Coach del equipo. Trackea, anticipa, facilita."
  capabilities:
    - receives_from
    - project-tracking
    - blocker-detection
    - session-audit
    - sprint-tracking
  launch_command: "hermes acp"
  keep_alive: true

# Model configuration
model:
  default: kimi-k2.5
  provider: opencode-go
  base_url: https://opencode.ai/zen/go/v1

# Toolsets — PM tools only
toolsets:
  - file
  - terminal
  - memory
  - session_search
  - todo
  - clarify

skills:
  external_dirs:
    - /home/prometeo/Aether-Agents/home/skills

# Session settings
# Personality overlay must be "none" — prevents kawaii default from overwriting SOUL.md
display:
  personality: none

max_iterations: 50