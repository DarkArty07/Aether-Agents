# Daedalus configuration — Aether Agents Daimon (Level 2)

# Agent discovery field — Olympus reads this to register the Daimon
agent:
  name: daedalus
  role: ux-designer
  description: "UX/UI Designer exclusivo. Diseña experiencias, prototipa con LLM frontend. No implementa producción."
  capabilities:
    - receives_from
    - ux-design
    - prototyping
    - design-systems
    - accessibility-review
  launch_command: "hermes acp"
  keep_alive: true

# Model configuration
model: mimo-v2-omni
provider: opencode-go
base_url: https://opencode.ai/zen/go/v1

# Toolsets — prototyping and design tools
toolsets:
  - terminal
  - file
  - search_files
  - patch
  - execute_code
  - skills

skills:
  external_dirs:
    - /home/prometeo/Aether-Agents/home/skills

# Session settings
# Personality overlay must be "none" — prevents kawaii default from overwriting SOUL.md
display:
  personality: none

max_iterations: 50